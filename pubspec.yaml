name: hermes_console
description: "Cross-platform Hermes Agent Console with P2P encrypted communication"
publish_to: 'none'
version: 2.6.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # P2P & Network
  flutter_webrtc: ^0.9.4
  connectivity_plus: ^5.0.2
  
  # Cryptography & Security
  cryptography: ^2.7.0
  pointycastle: ^3.7.4
  
  # Compression
  archive: ^3.4.10
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1
  
  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  
  # Performance
  equatable: ^2.0.5
  
  # Internationalization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/icons/
    - assets/images/
  
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

flutter_intl:
  enabled: true
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/generated
