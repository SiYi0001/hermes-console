name: CI / 测试

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: 静态分析 / Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-3.22.0

      - name: 安装依赖 / Install dependencies
        run: flutter pub get

      - name: 静态分析 / Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  unit-tests:
    name: 单元测试 / Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: 运行单元测试 / Run unit tests
        run: flutter test --no-pub

      - name: 上传覆盖率 / Upload coverage
        uses: codecov/codecov-action@v7
        if: success()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: hermes-console-tests

  android-build:
    name: Android 构建 / Android Build
    runs-on: ubuntu-latest
    needs: [analyze, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - run: flutter pub get

      - name: 构建 APK / Build debug APK
        run: flutter build apk --debug

      - name: 上传 APK / Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-console-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  ios-build:
    name: iOS 构建 / iOS Build (macOS)
    runs-on: macos-latest
    needs: [analyze, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - run: flutter pub get

      - name: 构建 iOS / Build iOS
        run: flutter build ios --simulator --no-codesign

  web-build:
    name: Web 构建 / Web Build
    runs-on: ubuntu-latest
    needs: [analyze, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - run: flutter pub get

      - name: 构建 Web / Build Web
        run: flutter build web

      - name: 上传构建产物 / Upload build
        uses: actions/upload-artifact@v4
        with:
          name: hermes-console-web
          path: build/web/
          retention-days: 7
